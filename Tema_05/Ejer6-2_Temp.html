<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Actividad propuesta 6.2</h1>

    <button id="recordatorio">Mostrar recordatorio</button>

    <script>
      let idIntervalo = null;

      document
        .getElementById("recordatorio")
        .addEventListener("click", function () {
          if (idIntervalo === null) {
            idIntervalo = setInterval(function () {
              if (
                !confirm(
                  "Recuerda ponerte al día con JS ¿Quieres que te lo vuelva a recordar?",
                )
              ) {
                clearInterval(idIntervalo);
                idIntervalo = null;
              }
            }, 5000);
          }
        });
    </script>
  </body>
</html>
