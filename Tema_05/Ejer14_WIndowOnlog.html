<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Aplicación de reloj</h1>
    <p>La aplicación se ha iniciado correctamente.</p>
    <h3 id="fecha"></h3>
    <h3 id="hora"></h3>

    <button id="inicio">Inicia reloj</button>
    <button id="parar">Parar reloj</button>
    <button id="cambiarFormato">Cambiar 12h/24h</button>
    <button id="cambiarColor">Cambiar Color</button>

    <script>
      let intervalo;
      let formato24h = true;

      document.getElementById("inicio").addEventListener("click", function () {
        intervalo = setInterval(function () {
          const ahora = new Date();
          const opcionesFecha = {
            year: "numeric",
            month: "long",
            day: "numeric",
          };
          const fechaFormateada = ahora.toLocaleDateString(
            "es-ES",
            opcionesFecha,
          );
          document.getElementById("fecha").textContent = fechaFormateada;

          let horas = ahora.getHours();
          const minutos = ahora.getMinutes().toString().padStart(2, "0");
          const segundos = ahora.getSeconds().toString().padStart(2, "0");

          if (!formato24h) {
            horas = horas % 12 || 12; // Convertir a formato 12h
          }

          document.getElementById("hora").textContent =
            `${horas}:${minutos}:${segundos}`;
        }, 1000);
      });

      document.getElementById("parar").addEventListener("click", function () {
        clearInterval(intervalo);
      });

      document
        .getElementById("cambiarFormato")
        .addEventListener("click", function () {
          formato24h = !formato24h;
        });

      document
        .getElementById("cambiarColor")
        .addEventListener("click", function () {
          const colores = ["red", "blue", "green", "orange", "purple"];
          const colorAleatorio =
            colores[Math.floor(Math.random() * colores.length)];
          document.getElementById("hora").style.color = colorAleatorio;
        });
    </script>
  </body>
</html>
