<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador</title>
</head>
<body>
    <h1>Temporizador con setTimeout</h1>
    <button id="timeout">Mensaje en 3 segundos</button>
    <script>
        document.getElementById("timeout").addEventListener("click", function() {
            setTimeout(function() {
                alert("TIMEOUT! Han pasado 3 segundos.");
            }, 3000);
        });
    </script>
</body>
</html>
