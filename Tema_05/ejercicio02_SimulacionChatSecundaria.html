<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ventana Secundaria</title>
  </head>
  <body>
    <h1>Ventana Secundaria</h1>

    <input id="mensaje" placeholder="Mensaje para principal" />
    <button onclick="enviar()">Enviar</button>
    <button onclick="limpiar()">Limpiar chat</button>

    <h3>Chat:</h3>
    <div id="chat"></div>

    <script>
      // Enviar mensaje
      function enviar() {
        let texto = document.getElementById("mensaje").value;

        let chat = JSON.parse(localStorage.getItem("chat")) || [];

        chat.push("Secundaria: " + texto);

        localStorage.setItem("chat", JSON.stringify(chat));
        localStorage.setItem("nuevoMensaje", Date.now());
      }

      // Recibir cambios
      window.addEventListener("storage", function (e) {
        if (e.key === "chat" || e.key === "nuevoMensaje") {
          mostrarChat();
        }
      });

      // Mostrar chat
      function mostrarChat() {
        let chat = JSON.parse(localStorage.getItem("chat")) || [];
        document.getElementById("chat").innerHTML = chat.join("<br>");
      }

      // Limpiar chat
      function limpiar() {
        if (confirm("¿Seguro que quieres borrar el chat?")) {
          localStorage.removeItem("chat");
          mostrarChat();
        }
      }
    </script>
  </body>
</html>
