<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ejercicio 05: Cajero automático</title>
  </head>

  <body>
    <script>
      // Saldo inicial
      var saldo = 1000;

      // Array para guardar historial
      var historial = [];

      // Variable para controlar el menú
      var opcion;

      do {
        // Mostramos el menú
        opcion = prompt(
          "CAJERO AUTOMÁTICO\n\n" +
            "1) Ingresar dinero\n" +
            "2) Retirar dinero\n" +
            "3) Ver saldo\n" +
            "4) Ver historial\n" +
            "0) Salir",
        );

        opcion = parseInt(opcion);

        // INGRESAR DINERO
        if (opcion === 1) {
          var cantidad = parseFloat(prompt("Cantidad a ingresar:"));

          if (isNaN(cantidad) || cantidad <= 0) {
            alert("Cantidad no válida");
          } else {
            saldo += cantidad;

            var fecha = new Date().toLocaleString();

            historial.push(
              "Ingreso: +" + cantidad + "€ | Saldo: " + saldo + "€ | " + fecha,
            );

            if (historial.length > 5) {
              historial.shift();
            }

            alert("Ingreso realizado");
          }
        }

        // RETIRAR DINERO
        else if (opcion === 2) {
          var cantidad = parseFloat(prompt("Cantidad a retirar:"));

          if (isNaN(cantidad) || cantidad <= 0) {
            alert("Cantidad no válida");
          } else if (cantidad > saldo) {
            alert("No tienes suficiente saldo");
          } else {
            saldo -= cantidad;

            var fecha = new Date().toLocaleString();

            historial.push(
              "Retirada: -" + cantidad + "€ | Saldo: " + saldo + "€ | " + fecha,
            );

            if (historial.length > 5) {
              historial.shift();
            }

            alert("Retirada realizada");
          }
        }

        // VER SALDO
        else if (opcion === 3) {
          alert("Tu saldo actual es: " + saldo + " €");
        }

        // VER HISTORIAL
        else if (opcion === 4) {
          if (historial.length === 0) {
            alert("No hay operaciones todavía");
          } else {
            var texto = "Historial de operaciones:\n\n";

            for (var i = 0; i < historial.length; i++) {
              texto += historial[i] + "\n";
            }

            alert(texto);
          }
        }
      } while (opcion !== 0);

      // Mensaje al salir
      alert("Gracias por usar el cajero");

      /*Explicación pseudocódigo:
      INICIO

saldo = 1000
historial = lista vacía

REPETIR

mostrar menú
leer opción

SEGÚN opción

1 INGRESAR
    leer cantidad
    SI cantidad válida
        saldo = saldo + cantidad
        guardar operación en historial
    FIN SI

2 RETIRAR
    leer cantidad
    SI cantidad válida Y saldo suficiente
        saldo = saldo - cantidad
        guardar operación en historial
    FIN SI

3 VER SALDO
    mostrar saldo

4 VER HISTORIAL
    mostrar últimas operaciones

FIN SEGÚN

SI historial tiene más de 5 operaciones
    eliminar la más antigua
FIN SI

HASTA que opción = 0

mostrar mensaje de salida

FIN
      */
    </script>
  </body>
</html>
