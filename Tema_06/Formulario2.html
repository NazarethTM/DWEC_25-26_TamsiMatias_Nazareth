<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Ejercicio 2 - Input en tiempo real</title>
</head>

<body>

  <h1>Ejercicio 2 - Input en tiempo real</h1>

  <form>
    Escribe tu ciudad:
    <input type="text" id="ciudad">
  </form>

  <h2>Resultado</h2>
  <div id="resultado"></div>

  <script>
    const ciudad = document.getElementById("ciudad");
    const resultado = document.getElementById("resultado");

    ciudad.addEventListener("input", function () {
      resultado.textContent = "Estás escribiendo: " + ciudad.value;
    });
  </script>

</body>

</html>
